version: "3.9"

services:
  joi-energy-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: joi-energy-api
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-Xms256m -Xmx512m"
    restart: unless-stopped

  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: ecomart-jenkins
    user: root
    ports:
      - "8082:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    restart: unless-stopped

volumes:
  jenkins_home:
